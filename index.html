<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALS - Premium Streetwear</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التنسيقات العامة للموقع */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #fff;
            color: #111;
            overflow-x: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* شريط الإعلانات العلوي */
        .announcement-bar {
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            direction: rtl;
        }

        /* الهيدر */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
        }
        .nav-menu a {
            margin: 0 15px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .nav-menu a:hover {
            color: #666;
        }
        .header-icons {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header-icons button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: red;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 50%;
        }
        .menu-toggle {
            display: none;
        }

        /* شريط البحث */
        .search-bar {
            display: none;
            padding: 15px 5%;
            background: #f5f5f5;
            border-bottom: 1px solid #eee;
            justify-content: center;
            gap: 10px;
        }
        .search-bar.active {
            display: flex;
        }
        .search-bar input {
            width: 100%;
            max-width: 500px;
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Hero Section تم دمج تشغيل بانر banner.png هنا */
        .hero {
            background: url('banner.png') no-repeat center center/cover;
            height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
        }
        /* طبقة حماية داكنة اختيارية فوق البانر ليظهر الكلام بوضوح */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            color: #fff;
        }
        .hero-content h1 {
            font-size: 48px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .hero-content p {
            font-size: 20px;
            color: #f1f1f1;
            margin-bottom: 30px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .hero-btn {
            background: #fff;
            color: #111;
            padding: 14px 35px;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .hero-btn:hover {
            background: #111;
            color: #fff;
        }

        /* About Section */
        .about {
            padding: 60px 10%;
            text-align: center;
            background: #fff;
        }
        .about h2 {
            font-size: 28px;
            margin-bottom: 15px;
        }
        .about p {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }

        /* سيكشن المنتجات */
        .section-title {
            text-align: center;
            margin-top: 40px;
            font-size: 22px;
            letter-spacing: 2px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px 5%;
        }
        .card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .card img {
            width: 100%;
            height: 320px;
            object-fit: contain;
            background-color: #fafafa;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .card h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .card .price {
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        
        .add-to-cart {
            background: #111;
            color: #fff;
            border: none;
            padding: 12px 15px;
            font-weight: 600;
            font-size: 11.5px;
            letter-spacing: 0.5px;
